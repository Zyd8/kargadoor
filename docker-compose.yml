services:
  flutter:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64  # Ensures Linux container on Windows
    privileged: true  # Required for USB device access on Windows
    volumes:
      # Mount the frontend directory specifically
      - ./frontend:/home/developer/app
      # Mount Flutter SDK as a volume to persist across rebuilds (optional)
      # If this volume is empty, it will use the Flutter from the image
      - flutter_sdk:/home/developer/flutter
      # Mount Android SDK to persist across rebuilds
      - android_sdk:/home/developer/android-sdk
      # Mount USB devices (Linux hosts)
      - /dev/bus/usb:/dev/bus/usb:ro
      # Mount udev for USB device detection (Linux hosts)
      - /run/udev:/run/udev:ro
    working_dir: /home/developer/app
    tty: true
    stdin_open: true
    # Default command - can be overridden
    # Connect to host's ADB server instead of starting own server
    # Make sure host ADB is running: adb -a -P 5037 nodaemon server start
    command: >
      sh -c "
        echo 'Connecting to host ADB server at host.docker.internal:5037...' &&
        adb devices &&
        /bin/bash
      "
    ports:
      - "3000:3000"  # For web server
      - "5000:5000"  # For API server (if needed)
      - "5037:5037"  # ADB server port (for ADB over network if needed)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLUTTER_WEB_PORT=3000
      # Ensure consistent path handling across platforms
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - ANDROID_HOME=/home/developer/android-sdk
      # Connect to host's ADB server instead of starting own server
      # Make sure host ADB is running: adb -a -P 5037 nodaemon server start
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037

# Named volume for Flutter SDK to persist across containers
volumes:
  flutter_sdk:
  android_sdk: